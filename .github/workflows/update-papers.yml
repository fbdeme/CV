name: Render Publications and Deploy

on:
  push:
    paths:
      - 'data/publications.jsonld'
      - 'scripts/render_publications.py'
  workflow_dispatch:  # Manual trigger

permissions:
  contents: write

jobs:
  render-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history for gh-pages

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Render publications from JSON-LD
        run: python scripts/render_publications.py

      - name: Commit to main if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet index.html || {
            git add index.html
            git commit -m "chore: auto-render publications from JSON-LD"
            git push origin main
          }

      - name: Sync to gh-pages
        run: |
          git checkout gh-pages
          git checkout main -- index.html style.css data/ scripts/ assets/
          git diff --cached --quiet || {
            git add -A
            git commit -m "chore: sync from main after publications render"
            git push origin gh-pages
          }
